name: CI — HabitQuest

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      # 1. Клонуємо репозиторій
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Встановлюємо Node.js (без cache щоб уникнути помилки lock file)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Встановлюємо залежності
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # 4. Запускаємо тести
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost/test
          RABBITMQ_URL: amqp://localhost

      # 5. Запускаємо тести з покриттям + junit.xml
      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:ci
        env:
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost/test
          RABBITMQ_URL: amqp://localhost

      # 6. Зберігаємо HTML звіт покриття
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: backend/coverage/
          retention-days: 30

      # 7. Зберігаємо junit.xml
      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml-report
          path: backend/reports/junit.xml
          retention-days: 30

      # 8. SonarCloud (лише для main та PR)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend
