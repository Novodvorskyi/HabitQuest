name: CI — HabitQuest

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Create reports directory
        run: mkdir -p backend/reports

      - name: Run tests with coverage
        working-directory: backend
        run: node node_modules/.bin/jest --coverage --forceExit --detectOpenHandles --reporters=default --reporters=jest-junit
        env:
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost/test
          RABBITMQ_URL: amqp://localhost
          JEST_JUNIT_OUTPUT_DIR: reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: backend/coverage/
          retention-days: 30

      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml-report
          path: backend/reports/junit.xml
          retention-days: 30

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend
