# ════════════════════════════════════════
# sonar-project.properties
# Конфігурація SonarCloud для HabitQuest
# ════════════════════════════════════════

# Унікальний ключ проєкту 
sonar.projectKey=Novodvorskyi
sonar.organization=novodvorskyi

# Назва та версія
sonar.projectName=HabitQuest
sonar.projectVersion=1.0.0

# Де знаходиться код
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,reports/**,tests/**

# Де знаходяться тести
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Звіти покриття (генерується Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# JUnit звіт тестів
sonar.testExecutionReportPaths=reports/junit.xml

# Мова
sonar.language=js
sonar.sourceEncoding=UTF-8
