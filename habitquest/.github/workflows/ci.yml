# ════════════════════════════════════════════════════════
# .github/workflows/ci.yml
# CI/CD pipeline для HabitQuest
#
# Запускається автоматично при:
#   - push в будь-яку гілку
#   - pull request в main
#
# Кроки:
#   1. Checkout коду
#   2. Встановлення Node.js
#   3. npm install
#   4. Запуск тестів
#   5. Звіт про покриття (лише для main)
# ════════════════════════════════════════════════════════

name: CI — HabitQuest

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Клонуємо репозиторій
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлюємо Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 3. Встановлюємо залежності
      - name: Install dependencies
        run: npm ci

      # 4. Запускаємо unit та інтеграційні тести
      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost/test
          RABBITMQ_URL: amqp://localhost

      # 5. Генеруємо звіт покриття (тільки для main)
      - name: Coverage report
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage
        env:
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost/test
          RABBITMQ_URL: amqp://localhost

      # 6. Завантажуємо звіт покриття як артефакт
      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
